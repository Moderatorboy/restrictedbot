services:
  - type: worker
    name: telegram-bulk-resume
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python forwarder.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: SESSION_STRING
        sync: false
      - key: DEST_CHANNEL
        sync: false
